name: 发布 Zotero 插件

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: 构建并发布 XPI
    runs-on: ubuntu-latest
    steps:
      - name: 检出版本标签
        uses: actions/checkout@v4

      - name: 生成 XPI 安装包
        shell: bash
        run: |
          version="$(node -p "require('./manifest.json').version")"
          zip -X -r "research-agent-${version}.xpi" manifest.json bootstrap.js prefs.js prefs.xhtml prefs-ui.js chrome src locale icons vendor LICENSE README.md
          unzip -t "research-agent-${version}.xpi"

      - name: 创建 GitHub Release 并上传安装包
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" research-agent-*.xpi --title "Research Agent ${GITHUB_REF_NAME#v}" --generate-notes
